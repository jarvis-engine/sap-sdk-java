services:
  wiremock:
    image: wiremock/wiremock:3.3.1
    ports:
      - "9090:8080"
    volumes:
      - ./wiremock:/home/wiremock
    command: --verbose
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/__admin/mappings || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  demo:
    build: .
    ports:
      - "8080:8080"
    environment:
      SAP_BASE_URL: http://wiremock:8080
      SAP_ENV: test
      SAP_AUTH_TYPE: BASIC
      SAP_USERNAME: demo-user
      SAP_PASSWORD: demo-pass
    depends_on:
      wiremock:
        condition: service_healthy
